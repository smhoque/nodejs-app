# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json

name: Deploy Node Application

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Create .env file
        run: echo "MONGO_PASSWORD=${{ secrets.MONGO_PASSWORD }}" > .env

      - name: Login to Docker Hub
        run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: docker build -t emdadripon/nodejs-app:latest .

      - name: Push Docker image to Docker Hub
        run: docker push emdadripon/nodejs-app:latest

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Pull Docker image from Docker Hub
        run: docker pull emdadripon/nodejs-app:latest

      - name: Delete old container if exists
        run: docker rm -f nodejs-app || true

      - name: Run new container
        run: docker run -d -p 4000:4000 --name nodejs-app-container emdadripon/nodejs-app:latest

